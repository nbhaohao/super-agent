<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Agent</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --blue: #58a6ff;
      --green: #3fb950;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--blue);
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg { display: flex; flex-direction: column; gap: 4px; }

    .msg-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 4px;
    }

    .msg.user .msg-label { text-align: right; }

    .msg-body {
      padding: 8px 12px;
      border-radius: 8px;
      line-height: 1.6;
      max-width: 85%;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user { align-items: flex-end; }
    .msg.user .msg-body { background: #1f6feb; color: #fff; }

    .msg.assistant { align-items: flex-start; }
    .msg.assistant .msg-body {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .tool-call {
      display: block;
      margin-top: 6px;
      padding: 4px 8px;
      background: #0c2137;
      border-left: 3px solid var(--blue);
      border-radius: 2px;
      color: var(--blue);
      font-size: 12px;
    }

    .tool-result {
      display: block;
      margin-top: 2px;
      padding: 4px 8px;
      background: #0c2318;
      border-left: 3px solid var(--green);
      border-radius: 2px;
      color: var(--green);
      font-size: 12px;
    }

    .cursor {
      display: inline-block;
      width: 6px; height: 13px;
      background: var(--muted);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--blue); }

    #send {
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      padding: 8px 16px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send:hover { background: #2ea043; }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>Super Agent</header>
  <div id="messages"></div>
  <footer>
    <input id="input" type="text" placeholder="输入消息..." autocomplete="off">
    <button id="send" onclick="send()">发送 ↵</button>
  </footer>

  <script>
    const $ = id => document.getElementById(id);

    $('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    function addMsg(role) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'user' ? 'You' : 'Assistant';
      const body = document.createElement('div');
      body.className = 'msg-body';
      wrap.append(label, body);
      $('messages').appendChild(wrap);
      scroll();
      return body;
    }

    // Track the current text node so streaming appends in-place
    let textNode = null;

    function ensureText(body) {
      if (!textNode) {
        textNode = document.createTextNode('');
        body.appendChild(textNode);
      }
      return textNode;
    }

    function addBlock(body, cls, text) {
      textNode = null; // next text goes in a fresh node after this block
      const el = document.createElement('span');
      el.className = cls;
      el.textContent = text;
      body.appendChild(el);
      scroll();
    }

    function scroll() {
      const el = $('messages');
      el.scrollTop = el.scrollHeight;
    }

    async function send() {
      const msg = $('input').value.trim();
      if (!msg || $('send').disabled) return;

      $('input').value = '';
      $('send').disabled = true;

      const userBody = addMsg('user');
      userBody.textContent = msg;

      const body = addMsg('assistant');
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      body.appendChild(cursor);
      textNode = null;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop() ?? '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }

            switch (event.type) {
              case 'text':
                cursor.remove();
                ensureText(body).textContent += event.text;
                scroll();
                break;
              case 'tool-call':
                addBlock(body, 'tool-call',
                  `🔧 ${event.toolName}(${JSON.stringify(event.input)})`);
                break;
              case 'tool-result':
                addBlock(body, 'tool-result',
                  `✓ ${JSON.stringify(event.output)}`);
                break;
              case 'error':
                cursor.remove();
                ensureText(body).textContent = `⚠ ${event.message}`;
                break;
            }
          }
        }
      } catch (e) {
        body.textContent = `⚠ ${e.message}`;
      } finally {
        cursor.remove();
        $('send').disabled = false;
        $('input').focus();
      }
    }
  </script>
</body>
</html>
